# ArchTitan Default Hyprland Config

# Monitor setup
monitor=,preferred,auto,1

# Input
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = yes
        tap-to-click = true
    }
}

# Programs
$terminal = kitty
$menu = wofi --show drun
$browser = chromium
$filemanager = $terminal -e ranger

# Environment
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1

# Autostart
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Auto-launch installer (only on live ISO)
exec-once = bash -c 'if [ -d /run/archiso/bootmnt ]; then sleep 3 && sudo -E calamares; fi'

# Keybindings
$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $filemanager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, I, exec, sudo calamares
bind = $mainMod, L, exec, swaylock
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# General appearance
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(7aa2f7ee) rgba(9ece6aee) rgba(e0af68ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(414868aa)
    layout = dwindle
}

# Decoration — blur, shadows, rounding
decoration {
    rounding = 12

    blur {
        enabled = false
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        offset = 0, 4
        color = rgba(1a1a2ecc)
    }

    dim_inactive = false
    dim_strength = 0.1

    active_opacity = 1.0
    inactive_opacity = 0.92
}

# Animations — smooth and snappy
animations {
    enabled = yes

    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = snappy, 0.4, 0, 0.2, 1

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, snappy
    animation = border, 1, 10, default
    animation = borderangle, 1, 30, default, loop
    animation = fade, 1, 5, smoothIn
    animation = fadeDim, 1, 5, smoothIn
    animation = workspaces, 1, 5, overshot, slidevert
}

# Layout
dwindle {
    pseudotile = yes
    preserve_split = yes
    force_split = 2
}

# Misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

# Window rules
windowrulev2 = fullscreen, class:^(calamares)$
windowrulev2 = center, class:^(calamares)$
windowrulev2 = float, class:^(calamares)$
