---
modules-search: [ local ]

branding: archtitan

prompt-install: false
dont-chroot: false
oem-setup: false

sequence:
- show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
- exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - luksbootkeyfile
    - luksopenswaphookcfg
    - initcpiocfg
    - initcpio
    - plymouthcfg
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - grubcfg
    - bootloader
    - umount
- show:
    - finished
